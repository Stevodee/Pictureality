<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Panorama Viewer</title>

<!--
  ============================================================================
  PANORAMA VIEWER — Three.js + Panolens.js, images hosted on GitHub Pages
  ============================================================================

  PINNED VERSIONS (important):
  Panolens.js hasn't been updated in years and breaks on modern Three.js.
  three.js r105 + panolens 0.11.0 is a combo confirmed to still work together.
  Do not "upgrade" these independently or the viewer will silently fail.

  HOW TO HOST YOUR PANORAMAS ON GITHUB:
  1. Create a new repo (must be PUBLIC — private repo files aren't reachable
     by a plain image URL without an auth token).
  2. Add your equirectangular (2:1 aspect ratio) 360 photos to a folder in
     it, e.g. /panos/location1.jpg
  3. Push, then go to Settings -> Pages -> Build and deployment -> Deploy
     from a branch -> pick "main" and "/ (root)" -> Save.
  4. GitHub gives you a URL like:
       https://YOUR_USERNAME.github.io/YOUR_REPO/panos/location1.jpg
     Set BASE_URL below to https://YOUR_USERNAME.github.io/YOUR_REPO/
     and just list each filename in the PANORAMAS array.
  5. (Optional, no waiting for Pages to build) You can instead point
     straight at raw.githubusercontent.com — it works immediately on push
     and also sends proper CORS headers, it just isn't behind GitHub's CDN:
       https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/panos/location1.jpg

  Both of the above send a real Access-Control-Allow-Origin header, so the
  CORS/black-sphere problem that Google Drive had does not apply here —
  no proxy, no workaround needed.
-->

<style>
  :root {
    --bg: #0b0d10;
    --panel: #14171c;
    --line: #262b33;
    --text: #e8e6df;
    --text-dim: #8b9099;
    --accent: #d98a3d;
    --accent-dim: #6b5636;
    --mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #viewer-container {
    position: absolute;
    inset: 0;
  }

  /* ---- top bar: title + heading readout (the "signature" detail) ---- */
  #topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    pointer-events: none;
    z-index: 10;
    background: linear-gradient(to bottom, rgba(11,13,16,0.85), transparent);
  }

  #scene-title {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  #scene-title span {
    color: var(--text);
    font-size: 15px;
    letter-spacing: 0.02em;
    display: block;
    margin-top: 2px;
    text-transform: none;
  }

  #heading-readout {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    text-align: right;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #heading-degrees {
    color: var(--accent);
    font-size: 16px;
    min-width: 3.5em;
    display: inline-block;
    text-align: right;
  }

  #compass-dial {
    width: 22px; height: 22px;
    border: 1px solid var(--line);
    border-radius: 50%;
    position: relative;
    flex-shrink: 0;
  }

  #compass-needle {
    position: absolute;
    top: 50%; left: 50%;
    width: 2px; height: 8px;
    background: var(--accent);
    transform-origin: bottom center;
    transform: translate(-50%, -100%) rotate(0deg);
  }

  /* ---- bottom gallery rail ---- */
  #gallery {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    display: flex;
    gap: 10px;
    padding: 16px 20px 20px;
    overflow-x: auto;
    z-index: 10;
    background: linear-gradient(to top, rgba(11,13,16,0.9), transparent);
    scrollbar-width: thin;
  }

  .thumb {
    flex-shrink: 0;
    width: 96px; height: 64px;
    border-radius: 3px;
    border: 1px solid var(--line);
    background: var(--panel) center/cover no-repeat;
    cursor: pointer;
    position: relative;
    opacity: 0.6;
    transition: opacity 0.15s ease, border-color 0.15s ease;
  }

  .thumb:hover { opacity: 0.9; }

  .thumb.active {
    opacity: 1;
    border-color: var(--accent);
  }

  .thumb-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.03em;
    padding: 3px 5px;
    background: rgba(11,13,16,0.75);
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .thumb.active .thumb-label { color: var(--accent); }

  /* ---- loading state ---- */
  #loading {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 20;
    background: var(--bg);
    transition: opacity 0.3s ease;
  }

  #loading.hidden {
    opacity: 0;
    pointer-events: none;
  }

  #loading-ring {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 2px solid var(--line);
    border-top-color: var(--accent);
    animation: spin 0.9s linear infinite;
  }

  #loading-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- error banner ---- */
  #error-banner {
    position: absolute;
    top: 70px; left: 24px; right: 24px;
    z-index: 15;
    background: var(--panel);
    border: 1px solid #7a3d2e;
    border-left: 3px solid #c4553e;
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
    color: var(--text-dim);
    display: none;
    max-width: 480px;
  }

  #error-banner.show { display: block; }
  #error-banner strong { color: var(--text); }

  #fullscreen-btn {
    position: absolute;
    top: 20px; right: 24px;
    z-index: 11;
    background: transparent;
    border: none;
    display: none; /* shown only after we know a title bar layout works */
  }
</style>
</head>
<body>

<div id="viewer-container"></div>

<div id="topbar">
  <div id="scene-title">LOCATION<span id="scene-title-name">—</span></div>
  <div id="heading-readout">
    <div id="compass-dial"><div id="compass-needle"></div></div>
    <span id="heading-degrees">000°</span>
  </div>
</div>

<div id="error-banner"></div>

<div id="gallery"></div>

<div id="loading">
  <div id="loading-ring"></div>
  <div id="loading-text">LOADING PANORAMA…</div>
</div>

<!-- Pinned, compatible versions — see comment block above -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/105/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/panolens@0.11.0/build/panolens.min.js"></script>

<script>
(function () {
  "use strict";

  // ==========================================================================
  // CONFIG — edit this section
  // ==========================================================================

  // Where your repo is served from. Two common choices:
  //   GitHub Pages (behind GitHub's CDN, takes a minute to go live after push):
  //     "https://YOUR_USERNAME.github.io/YOUR_REPO/"
  //   raw.githubusercontent.com (live instantly on push, no CDN):
  //     "https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/"
  // Include the trailing slash. Leave as-is and it'll just fall back to the
  // sample panorama below until you fill this in.
  var BASE_URL = "https://stevodee.github.io/Pictureality/";

  // Your panoramas. "file" is the path to the image *inside your repo*,
  // relative to BASE_URL — e.g. if BASE_URL points at the repo root and your
  // image lives at /panos/location1.jpg, file is "panos/location1.jpg".
  // Full resolution is used directly — GitHub doesn't need a resize
  // parameter the way the Drive thumbnail endpoint did, so keep your source
  // images at a sane size (a 6000x3000 equirectangular JPG is plenty; there's
  // no benefit past that and it just slows down loading).
  var PANORAMAS = [
    { file: "panos/Bedroom2_Gibsonhouse.jpg", title: "Bedroom2_Gibsonhouse" },
    { file: "panos/lBedroom3_Gibsonhouse.jpg", title: "Bedroom3_Gibsonhouse" },
    { file: "panos/Bedroom4_Gibsonhouse.jpg", title: "Bedroom4_Gibsonhouse" },
    { file: "panos/Bedroom5_Gibsonhouse.jpg", title: "Bedroom5_Gibsonhouse" },
    { file: "panos/lDining_Gibsonhouse.jpg", title: "Untitled Location 2" },
    { file: "panos/Foyer_Gibsonhouse.jpg", title: "Foyer_Gibsonhouse" },
    { file: "panos/Hallway_Gibsonhouse.jpg", title: "Hallway_Gibsonhouse" },
    { file: "panos/kitchen_Gibsonhousejpg", title: "kitchen_Gibsonhouse" },
    { file: "panos/Landing_Gibsonhouse.jpg", title: "Landing_Gibsonhouse.jpg" },
    { file: "panos/Living1_Gibsonhouse.jpg", title: "Living1_Gibsonhouse" },
    { file: "panos/Living2_Gibsonhouse.jpg", title: "Living2_Gibsonhouse" },
    { file: "panos/Living3_Gibsonhouse.jpg", title: "Living3_Gibsonhouse" },
    { file: "panos/Office_Gibsonhouse.jpg", title: "Office_Gibsonhouse" },
    { file: "panos/Servantlanding_Gibsonhouse.jpg", title: "Servantlanding_Gibsonhouse" },


    // Add as many as you like — the gallery rail scrolls horizontally.
  ];

  // A public, CORS-friendly placeholder so the page shows *something*
  // working the moment you open it, before you've filled in BASE_URL and
  // your own file paths above. Safe to ignore once real entries are set.
  var PLACEHOLDER = {
    title: "Sample panorama (set BASE_URL and PANORAMAS above with your own)",
    directUrl: "https://i.imgur.com/wTCPouq.jpg"
  };

  // ==========================================================================
  // URL building
  // ==========================================================================

  function panoUrl(entry) {
    if (entry.directUrl) return entry.directUrl;
    return BASE_URL + entry.file;
  }

  var scenes = (BASE_URL ? PANORAMAS : []).filter(function (p) { return p.file; });
  if (scenes.length === 0) scenes = [PLACEHOLDER];

  // ==========================================================================
  // Viewer setup
  // ==========================================================================

  var container = document.getElementById("viewer-container");
  var loadingEl = document.getElementById("loading");
  var loadingTextEl = document.getElementById("loading-text");
  var errorEl = document.getElementById("error-banner");
  var titleNameEl = document.getElementById("scene-title-name");
  var headingDegEl = document.getElementById("heading-degrees");
  var needleEl = document.getElementById("compass-needle");
  var galleryEl = document.getElementById("gallery");

  var viewer = new PANOLENS.Viewer({
    container: container,
    controlBar: true,
    autoRotate: false,
    output: "console"
  });

  var currentPanorama = null;
  var currentIndex = -1;

  function showLoading(msg) {
    loadingTextEl.textContent = msg || "LOADING PANORAMA…";
    loadingEl.classList.remove("hidden");
  }

  function hideLoading() {
    loadingEl.classList.add("hidden");
  }

  function showError(html) {
    errorEl.innerHTML = html;
    errorEl.classList.add("show");
  }

  function clearError() {
    errorEl.classList.remove("show");
  }

  function buildGallery() {
    galleryEl.innerHTML = "";
    scenes.forEach(function (entry, i) {
      var el = document.createElement("div");
      el.className = "thumb" + (i === currentIndex ? " active" : "");
      el.style.backgroundImage = "url('" + panoUrl(entry) + "')";
      el.title = entry.title;
      el.addEventListener("click", function () { loadScene(i); });

      var label = document.createElement("div");
      label.className = "thumb-label";
      label.textContent = entry.title;
      el.appendChild(label);

      galleryEl.appendChild(el);
    });
  }

  function loadScene(index) {
    if (index === currentIndex) return;
    var entry = scenes[index];
    currentIndex = index;

    clearError();
    showLoading("LOADING " + entry.title.toUpperCase());
    titleNameEl.textContent = entry.title;

    var url = panoUrl(entry);
    var next = new PANOLENS.ImagePanorama(url);

    var failSafe = setTimeout(function () {
      hideLoading();
      showError(
        "<strong>This panorama didn't load.</strong><br>" +
        "Double-check BASE_URL and the file path are correct, that the repo " +
        "is public, and — if using GitHub Pages — that the Pages build has " +
        "finished (it can take a minute or two after your first push)."
      );
    }, 15000);

    next.addEventListener("progress", function (evt) {
      if (evt && evt.detail && evt.detail.lengthComputable) {
        var pct = Math.round((evt.detail.loaded / evt.detail.total) * 100);
        loadingTextEl.textContent = "LOADING " + entry.title.toUpperCase() + " — " + pct + "%";
      }
    });

    next.addEventListener("load", function () {
      clearTimeout(failSafe);
      hideLoading();
    });

    next.addEventListener("error", function () {
      clearTimeout(failSafe);
      hideLoading();
      showError(
        "<strong>This panorama didn't load.</strong><br>" +
        "Confirm BASE_URL and the file path are correct and that the repo " +
        "is public — a private repo's files aren't reachable by a plain " +
        "image URL."
      );
    });

    viewer.add(next);
    if (currentPanorama) {
      viewer.setPanorama(next);
      var old = currentPanorama;
      setTimeout(function () { viewer.remove(old); }, 1000);
    }
    currentPanorama = next;

    buildGallery();
  }

  // ==========================================================================
  // Heading / compass readout — driven by the actual camera, not decorative
  // ==========================================================================

  function updateCompass() {
    if (viewer && viewer.camera) {
      var dir = new THREE.Vector3();
      viewer.camera.getWorldDirection(dir);
      var deg = Math.round((Math.atan2(dir.x, dir.z) * 180 / Math.PI + 360) % 360);
      headingDegEl.textContent = ("000" + deg).slice(-3) + "°";
      needleEl.style.transform = "translate(-50%, -100%) rotate(" + deg + "deg)";
    }
    requestAnimationFrame(updateCompass);
  }

  // ==========================================================================
  // Boot
  // ==========================================================================

  loadScene(0);
  updateCompass();

})();
</script>

</body>
</html>
