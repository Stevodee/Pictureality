<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Panorama Viewer</title>

<!--
  ============================================================================
  PANORAMA VIEWER — Three.js + Panolens.js, images + data hosted on GitHub
  ============================================================================

  PINNED VERSIONS (important):
  Panolens.js hasn't been updated in years and breaks on modern Three.js.
  three.js r105 + panolens 0.11.0 is a combo confirmed to still work together.
  Do not "upgrade" these independently or the viewer will silently fail.

  HOW THIS WORKS NOW:
  This page no longer has any panorama list hard-coded in it. Instead it
  fetches a file called config.json (sitting next to this file, in the same
  repo) which lists every panorama, its title, and any hotspot links to
  other panoramas. That file is meant to be created and edited through
  admin.html (the companion page) rather than by hand — that's what removes
  the typo risk of hand-editing a JS array.

  IMPORTANT: because this page fetches config.json, it must be viewed
  through its real URL (GitHub Pages or raw.githubusercontent.com) — opening
  it by double-clicking the file on your own computer will NOT work, browsers
  block that kind of fetch for local files for security reasons.

  SETUP, ONE TIME:
  1. Make sure this repo is PUBLIC.
  2. Enable GitHub Pages: Settings -> Pages -> Deploy from a branch -> main -> / (root).
  3. Open admin.html (uploaded alongside this file) through its live URL,
     paste in a GitHub token, and use it to upload images and build
     config.json. See admin.html's own comments for details on the token.
-->

<style>
  :root {
    --bg: #0b0d10;
    --panel: #14171c;
    --line: #262b33;
    --text: #e8e6df;
    --text-dim: #8b9099;
    --accent: #d98a3d;
    --accent-dim: #6b5636;
    --mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #viewer-container {
    position: absolute;
    inset: 0;
  }

  /* ---- top bar: title + heading readout (the "signature" detail) ---- */
  #topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    pointer-events: none;
    z-index: 10;
    background: linear-gradient(to bottom, rgba(11,13,16,0.85), transparent);
  }

  #scene-title {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  #scene-title span {
    color: var(--text);
    font-size: 15px;
    letter-spacing: 0.02em;
    display: block;
    margin-top: 2px;
    text-transform: none;
  }

  #heading-readout {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    text-align: right;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #heading-degrees {
    color: var(--accent);
    font-size: 16px;
    min-width: 3.5em;
    display: inline-block;
    text-align: right;
  }

  #compass-dial {
    width: 22px; height: 22px;
    border: 1px solid var(--line);
    border-radius: 50%;
    position: relative;
    flex-shrink: 0;
  }

  #compass-needle {
    position: absolute;
    top: 50%; left: 50%;
    width: 2px; height: 8px;
    background: var(--accent);
    transform-origin: bottom center;
    transform: translate(-50%, -100%) rotate(0deg);
  }

  /* ---- bottom gallery rail ---- */
  #gallery {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    display: flex;
    gap: 10px;
    padding: 16px 20px 20px;
    overflow-x: auto;
    z-index: 10;
    background: linear-gradient(to top, rgba(11,13,16,0.9), transparent);
    scrollbar-width: thin;
  }

  .thumb {
    flex-shrink: 0;
    width: 96px; height: 64px;
    border-radius: 3px;
    border: 1px solid var(--line);
    background: var(--panel) center/cover no-repeat;
    cursor: pointer;
    position: relative;
    opacity: 0.6;
    transition: opacity 0.15s ease, border-color 0.15s ease;
  }

  .thumb:hover { opacity: 0.9; }

  .thumb.active {
    opacity: 1;
    border-color: var(--accent);
  }

  .thumb-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.03em;
    padding: 3px 5px;
    background: rgba(11,13,16,0.75);
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .thumb.active .thumb-label { color: var(--accent); }

  /* ---- loading state ---- */
  #loading {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 20;
    background: var(--bg);
    transition: opacity 0.3s ease;
  }

  #loading.hidden {
    opacity: 0;
    pointer-events: none;
  }

  #loading-ring {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 2px solid var(--line);
    border-top-color: var(--accent);
    animation: spin 0.9s linear infinite;
  }

  #loading-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- error banner ---- */
  #error-banner {
    position: absolute;
    top: 70px; left: 24px; right: 24px;
    z-index: 15;
    background: var(--panel);
    border: 1px solid #7a3d2e;
    border-left: 3px solid #c4553e;
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
    color: var(--text-dim);
    display: none;
    max-width: 480px;
  }

  #error-banner.show { display: block; }
  #error-banner strong { color: var(--text); }

  #fullscreen-btn {
    position: absolute;
    top: 20px; right: 24px;
    z-index: 11;
    background: transparent;
    border: none;
    display: none; /* shown only after we know a title bar layout works */
  }
</style>
</head>
<body>

<div id="viewer-container"></div>

<div id="topbar">
  <div id="scene-title">LOCATION<span id="scene-title-name">—</span></div>
  <div id="heading-readout">
    <div id="compass-dial"><div id="compass-needle"></div></div>
    <span id="heading-degrees">000°</span>
  </div>
</div>

<div id="error-banner"></div>

<div id="gallery"></div>

<div id="loading">
  <div id="loading-ring"></div>
  <div id="loading-text">LOADING PANORAMA…</div>
</div>

<!-- Pinned, compatible versions — see comment block above -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/105/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/panolens@0.11.0/build/panolens.min.js"></script>

<script>
(function () {
  "use strict";

  var container = document.getElementById("viewer-container");
  var loadingEl = document.getElementById("loading");
  var loadingTextEl = document.getElementById("loading-text");
  var errorEl = document.getElementById("error-banner");
  var titleNameEl = document.getElementById("scene-title-name");
  var headingDegEl = document.getElementById("heading-degrees");
  var needleEl = document.getElementById("compass-needle");
  var galleryEl = document.getElementById("gallery");

  var viewer = new PANOLENS.Viewer({
    container: container,
    controlBar: true,
    autoRotate: false,
    output: "console"
  });

  var panoObjects = {};   // id -> PANOLENS.ImagePanorama
  var sceneList = [];     // ordered [{id, title, file}]
  var currentId = null;

  function showLoading(msg) {
    loadingTextEl.textContent = msg || "LOADING PANORAMA…";
    loadingEl.classList.remove("hidden");
  }

  function hideLoading() {
    loadingEl.classList.add("hidden");
  }

  function showError(html) {
    errorEl.innerHTML = html;
    errorEl.classList.add("show");
  }

  function clearError() {
    errorEl.classList.remove("show");
  }

  function resolveUrl(file) {
    return new URL(file, window.location.href).toString();
  }

  function buildGallery() {
    galleryEl.innerHTML = "";
    sceneList.forEach(function (entry) {
      var el = document.createElement("div");
      el.className = "thumb" + (entry.id === currentId ? " active" : "");
      el.style.backgroundImage = "url('" + resolveUrl(entry.file) + "')";
      el.title = entry.title;
      el.addEventListener("click", function () { switchTo(entry.id); });

      var label = document.createElement("div");
      label.className = "thumb-label";
      label.textContent = entry.title;
      el.appendChild(label);

      galleryEl.appendChild(el);
    });
  }

  function switchTo(id) {
    if (id === currentId || !panoObjects[id]) return;
    var entry = sceneList.filter(function (s) { return s.id === id; })[0];
    if (!entry) return;
    currentId = id;
    titleNameEl.textContent = entry.title;
    viewer.setPanorama(panoObjects[id]);
    buildGallery();
  }

  // Panolens fires this on its own Infospot-link clicks (built-in hotspot
  // navigation) — keep our title bar and gallery highlight in sync with it.
  viewer.addEventListener("panolens-viewer-handler", function (evt) {
    if (evt && evt.data && evt.data.method === "setPanorama") {
      var target = evt.data.data;
      var found = Object.keys(panoObjects).filter(function (id) {
        return panoObjects[id] === target;
      })[0];
      if (found) {
        currentId = found;
        var entry = sceneList.filter(function (s) { return s.id === found; })[0];
        if (entry) titleNameEl.textContent = entry.title;
        buildGallery();
      }
    }
  });

  // ==========================================================================
  // Boot — fetch config.json (built by admin.html), build all panoramas,
  // wire up their links, then show the first one.
  // ==========================================================================

  showLoading("LOADING…");

  fetch("config.json", { cache: "no-store" })
    .then(function (res) {
      if (!res.ok) throw new Error("config.json not found (HTTP " + res.status + ")");
      return res.json();
    })
    .then(function (config) {
      var panoramas = (config && config.panoramas) || [];
      if (panoramas.length === 0) {
        throw new Error("config.json exists but has no panoramas listed yet — add some via admin.html.");
      }

      sceneList = panoramas.map(function (p) {
        return { id: p.id, title: p.title || p.id, file: p.file };
      });

      var firstId = sceneList[0].id;
      showLoading("LOADING " + sceneList[0].title.toUpperCase());

      var failSafe = setTimeout(function () {
        hideLoading();
        showError(
          "<strong>Taking a while to load.</strong><br>" +
          "Large panoramas can be slow the first time. If this never clears, " +
          "open the browser console for the actual error."
        );
      }, 20000);

      panoramas.forEach(function (p) {
        var pano = new PANOLENS.ImagePanorama(resolveUrl(p.file));
        panoObjects[p.id] = pano;
        viewer.add(pano);

        pano.addEventListener("load", function () {
          if (p.id === firstId) {
            clearTimeout(failSafe);
            hideLoading();
          }
        });

        pano.addEventListener("error", function () {
          if (p.id === firstId) {
            clearTimeout(failSafe);
            hideLoading();
          }
          showError(
            "<strong>\"" + (p.title || p.id) + "\" didn't load.</strong><br>" +
            "Check that <code>" + p.file + "</code> exists in the repo with that " +
            "exact filename and capitalization."
          );
        });
      });

      // Wire up hotspot links between panoramas (Panolens' built-in navigation)
      panoramas.forEach(function (p) {
        var source = panoObjects[p.id];
        (p.links || []).forEach(function (link) {
          var target = panoObjects[link.targetId];
          if (source && target) {
            source.link(target, new THREE.Vector3(link.x, link.y, link.z));
          }
        });
      });

      currentId = firstId;
      titleNameEl.textContent = sceneList[0].title;
      viewer.setPanorama(panoObjects[firstId]);
      buildGallery();
    })
    .catch(function (err) {
      hideLoading();
      showError(
        "<strong>Couldn't load config.json.</strong><br>" +
        (err && err.message ? err.message : "") + "<br>" +
        "Use admin.html to add panoramas, and make sure you're viewing this " +
        "through its live GitHub Pages / raw.githubusercontent.com URL — " +
        "opening the file locally won't work."
      );
    });

  // ==========================================================================
  // Heading / compass readout — driven by the actual camera, not decorative
  // ==========================================================================

  function updateCompass() {
    if (viewer && viewer.camera) {
      var dir = new THREE.Vector3();
      viewer.camera.getWorldDirection(dir);
      var deg = Math.round((Math.atan2(dir.x, dir.z) * 180 / Math.PI + 360) % 360);
      headingDegEl.textContent = ("000" + deg).slice(-3) + "°";
      needleEl.style.transform = "translate(-50%, -100%) rotate(" + deg + "deg)";
    }
    requestAnimationFrame(updateCompass);
  }

  updateCompass();

})();
</script>

</body>
</html>
